# Admin dashboard (same Next.js app, STAGING)  ->  https://admin-test.klicklocal.app
# Reverse proxy to the same staging Next.js process on 127.0.0.1:3001.
#
# Install:
#   sudo cp deploy/nginx/admin-test.klicklocal.app.conf /etc/nginx/sites-available/admin-test.klicklocal.app
#   sudo ln -s /etc/nginx/sites-available/admin-test.klicklocal.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name admin-test.klicklocal.app;

    client_max_body_size 50M;

    location = / {
        return 302 /login;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
