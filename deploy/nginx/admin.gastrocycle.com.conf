# Admin dashboard (same Next.js app)  ->  https://admin.gastrocycle.com
# Reverse proxy to the same Next.js process on 127.0.0.1:3000.
# The dashboard lives at /login, /dashboard, /admin/* inside the same app.
#
# Install:
#   sudo cp deploy/nginx/admin.gastrocycle.com.conf /etc/nginx/sites-available/admin.gastrocycle.com
#   sudo ln -s /etc/nginx/sites-available/admin.gastrocycle.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name admin.gastrocycle.com;

    client_max_body_size 50M;

    # Optional: send the bare root straight to the login screen.
    # Comment this out if you want admin.gastrocycle.com/ to show the landing page.
    location = / {
        return 302 /login;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
