# Laravel API (STAGING)  ->  https://api-test.klicklocal.app
# Deploys from the `develop` branch. Separate app dir + isolated DB from production.
# Document root MUST be the Laravel public/ folder.
#
# Install:
#   sudo cp deploy/nginx/api-test.klicklocal.app.conf /etc/nginx/sites-available/api-test.klicklocal.app
#   sudo ln -s /etc/nginx/sites-available/api-test.klicklocal.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api-test.klicklocal.app;

    root /var/www/klicklocal-staging/backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
