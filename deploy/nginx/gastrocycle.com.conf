# Landing page (Next.js)  ->  https://gastrocycle.com
# Reverse proxy to the Next.js process running on 127.0.0.1:3000
#
# Install:
#   sudo cp deploy/nginx/gastrocycle.com.conf /etc/nginx/sites-available/gastrocycle.com
#   sudo ln -s /etc/nginx/sites-available/gastrocycle.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name gastrocycle.com www.gastrocycle.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
