# Customer app + landing (Next.js, PRODUCTION)  ->  https://klicklocal.app
# Reverse proxy to the production Next.js process on 127.0.0.1:3000.
# Deploys from the `main` branch.
#
# Install:
#   sudo cp deploy/nginx/klicklocal.app.conf /etc/nginx/sites-available/klicklocal.app
#   sudo ln -s /etc/nginx/sites-available/klicklocal.app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name klicklocal.app www.klicklocal.app;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
