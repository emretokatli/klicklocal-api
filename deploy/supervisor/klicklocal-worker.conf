# Laravel queue worker — PRODUCTION (scheduled posts / publishing).
# App dir: /var/www/klicklocal/backend   Branch: main
#
# Install:
#   sudo cp deploy/supervisor/klicklocal-worker.conf /etc/supervisor/conf.d/
#   sudo supervisorctl reread
#   sudo supervisorctl update
#   sudo supervisorctl status
#
# NOTE: confirm the php path with `which php` and fix `command` if needed.

[program:klicklocal-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/klicklocal/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/klicklocal/backend/storage/logs/worker.log
stopwaitsecs=3600
